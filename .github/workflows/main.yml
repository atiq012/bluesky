name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  FTP-Deploy-Action:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm install --prefer-offline --no-audit

      - name: Build assets
        run: npm run build

      # Avoid running artisan in CI: app env/services (DB/Redis) may be unavailable here.
      # Run cache/config optimize commands on cPanel after deployment.

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          local-dir: ./
          log-level: verbose
          dangerous-clean-slate: false
          state-name: .ftp-deploy-sync-state-bluesky.json
          exclude: |
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/.env
            **/.env.backup
            **/.env.local
            **/docker/**
            **/phpunit.xml
            **/README.md
            **/LICENSE
            **/CHANGELOG.md
            **/CONTRIBUTING.md

      - name: Laravel optimize on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/dev2blue/apps/b2b
            mv vendor vendor_old 2>/dev/null || true
            composer install --no-dev --optimize-autoloader --no-interaction
            rm -rf vendor_old 2>/dev/null || true
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            # Supervisor workers keep old code until queue:restart after deploy
            php artisan queue:restart
            chmod -R 775 storage bootstrap/cache 2>/dev/null || true
            chmod -R 775 public/uploads 2>/dev/null || true

            # Shared upload path setup (single source for both domains)
            SHARED_UPLOAD_BASE="/home/devblues/public_html/uploads/agents"
            UPLOADS_ROOT="/home/devblues/public_html/uploads"
            APP_PUBLIC_UPLOADS="/home/dev2blue/public_html/uploads"
            APP_AGENT_UPLOAD_LINK="$APP_PUBLIC_UPLOADS/agents"
            PHP_USER="dev2blue"

            mkdir -p "$UPLOADS_ROOT" "$SHARED_UPLOAD_BASE"/{agency_img,trade_licence_img,ca_img,iata_img,hajj_licence_img,tin_img,nid_img,misc}

            # Prefer shared group write + setgid so new files stay group-writable.
            if command -v sudo >/dev/null 2>&1; then
              sudo chown -R devblues:"$PHP_USER" "$UPLOADS_ROOT" 2>/dev/null || \
              sudo chown -R "$PHP_USER":"$PHP_USER" "$UPLOADS_ROOT" 2>/dev/null || true
              sudo chmod -R 2775 "$UPLOADS_ROOT" 2>/dev/null || true
            else
              chmod -R 2775 "$UPLOADS_ROOT" 2>/dev/null || true
            fi

            if command -v sudo >/dev/null 2>&1 && command -v setfacl >/dev/null 2>&1; then
              sudo setfacl -R -m u:"$PHP_USER":rwx "$UPLOADS_ROOT" 2>/dev/null || true
              sudo setfacl -R -d -m u:"$PHP_USER":rwx "$UPLOADS_ROOT" 2>/dev/null || true
            fi

            php artisan agent-uploads:ensure || {
              echo "ERROR: PHP cannot write to agent upload path. Fix server permissions before continuing."
              exit 1
            }

            # Link second domain uploads/agents -> shared agents folder (non-destructive).
            if [ -L "$APP_AGENT_UPLOAD_LINK" ]; then
              ln -sfn "$SHARED_UPLOAD_BASE" "$APP_AGENT_UPLOAD_LINK"
            elif [ -e "$APP_AGENT_UPLOAD_LINK" ]; then
              echo "WARN: $APP_AGENT_UPLOAD_LINK exists and is not symlink. Skipping link creation."
            else
              ln -s "$SHARED_UPLOAD_BASE" "$APP_AGENT_UPLOAD_LINK" || true
            fi

            if command -v rsync >/dev/null 2>&1; then
              rsync -av \
                --exclude='.well-known/' \
                --exclude='index.php' \
                --exclude='.htaccess' \
                /home/dev2blue/apps/b2b/public/ /home/dev2blue/public_html/
            else
              (
                cd /home/dev2blue/apps/b2b/public
                tar --exclude='index.php' --exclude='.htaccess' -cf - .
              ) | (
                cd /home/dev2blue/public_html
                tar -xf -
              )
            fi
